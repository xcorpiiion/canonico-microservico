name: Deploy do Canônico para o GitHub Packages

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          # Removi o settings-path para ele usar o padrão do Runner, que é mais seguro

      - name: Publish to GitHub Packages
        # Adicionei o "-s" para garantir que ele use o settings gerado pelo setup-java
        run: mvn --batch-mode clean deploy -s /home/runner/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}